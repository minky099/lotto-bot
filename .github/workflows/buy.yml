name: Lotto Auto-Buy

on:
  workflow_dispatch:
    inputs:
      games:
        description: 'JSON 배열 형식 (예: [[1,7,12,23,34,40],[3,9,15,22,31,45]])'
        required: true
        type: string

jobs:
  buy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run lotto_bot
        env:
          DHLOTTERY_USER_ID: ${{ secrets.DHLOTTERY_USER_ID }}
          DHLOTTERY_PASSWORD: ${{ secrets.DHLOTTERY_PASSWORD }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GAMES_JSON: ${{ inputs.games }}
        run: echo "$GAMES_JSON" | python lotto_bot.py --stdin
