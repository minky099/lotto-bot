name: Weekly Lotto Auto-Buy

on:
  schedule:
    # 매주 토요일 오전 11:00 KST = 02:00 UTC (추첨 9시간 전)
    - cron: "0 2 * * 6"
  workflow_dispatch: {}

jobs:
  buy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python lotto_bot.py
        env:
          DHLOTTERY_USER_ID: ${{ secrets.DHLOTTERY_USER_ID }}
          DHLOTTERY_PASSWORD: ${{ secrets.DHLOTTERY_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LOTTO_GAME_COUNT: ${{ vars.LOTTO_GAME_COUNT || '5' }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-opus-4-7' }}
